<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANTIEGG Shortform Preview</title>
  <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: 'SUIT Variable', sans-serif; }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 40px; }

    .series-group { margin-bottom: 48px; }
    .series-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: #FFD700; }

    .clips { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .clip-btn {
      padding: 10px 20px; border: 1px solid #333; border-radius: 8px;
      background: #1a1a1a; color: #fff; cursor: pointer; font-family: inherit;
      font-size: 14px; transition: all 0.2s;
    }
    .clip-btn:hover { border-color: #FFD700; background: #222; }
    .clip-btn.active { border-color: #FFD700; background: #332900; color: #FFD700; }
    .clip-info { font-size: 12px; color: #666; margin-top: 4px; }

    .player-area {
      display: flex; gap: 32px; align-items: flex-start;
    }
    .phone-frame {
      width: 360px; height: 640px; background: #000; border-radius: 24px;
      overflow: hidden; position: relative; flex-shrink: 0;
      border: 2px solid #222;
    }
    video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .caption-overlay {
      position: absolute; bottom: 60px; left: 0; right: 0;
      text-align: center; padding: 0 20px; pointer-events: none;
    }
    .caption-speaker {
      font-size: 18px; font-weight: 700; color: #FFD700;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
      margin-bottom: 4px;
    }
    .caption-text {
      font-size: 24px; font-weight: 700; color: #fff; line-height: 1.38;
      text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 0 0 12px rgba(0,0,0,0.9), 0 4px 16px rgba(0,0,0,0.7);
    }

    .details {
      flex: 1; padding: 16px 0;
    }
    .detail-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .detail-score { color: #FFD700; font-size: 14px; margin-bottom: 16px; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .detail-table th { text-align: left; padding: 8px; border-bottom: 1px solid #333; color: #888; }
    .detail-table td { padding: 8px; border-bottom: 1px solid #1a1a1a; }
    .detail-table .timecode { font-family: monospace; color: #FFD700; }

    .status { position: fixed; bottom: 20px; right: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #888; }
  </style>
</head>

    let currentClip = 0
    let segmentIndex = 0
    let segmentStartTime = 0
    const player = document.getElementById('player')
    const captionEl = document.getElementById('caption')
    const speakerEl = document.getElementById('speaker')

    // Drag and drop video file
    document.body.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation() })
    document.body.addEventListener('drop', e => {
      e.preventDefault()
      const file = e.dataTransfer.files[0]
      if (file && file.type.startsWith('video/')) {
        player.src = URL.createObjectURL(file)
        document.getElementById('status').textContent = `로드됨: ${file.name}`
        playClip(currentClip)
      }
    })

    // Also support file input
    const fileInput = document.createElement('input')
    fileInput.type = 'file'
    fileInput.accept = 'video/*'
    fileInput.style.display = 'none'
    document.body.appendChild(fileInput)
    document.getElementById('status').innerHTML = '<button onclick="fileInput.click()" style="background:#333;color:#fff;border:1px solid #555;padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit">비디오 파일 선택</button> 또는 드래그 앤 드롭'
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0]
      if (file) {
        player.src = URL.createObjectURL(file)
        document.getElementById('status').textContent = `로드됨: ${file.name}`
        playClip(currentClip)
      }
    })

    function playClip(index) {
      currentClip = index
      segmentIndex = 0
      segmentStartTime = 0

      // Update button states
      document.querySelectorAll('.clip-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index)
      })

      // Update details
      const clip = clips[index]
      document.getElementById('detailTitle').textContent = clip.title
      document.getElementById('detailScore').textContent = clip.score ? `후킹 점수: ${clip.score}` : '프로세스 설명'

      const tbody = document.getElementById('detailBody')
      tbody.innerHTML = clip.segments.map(seg => `
        <tr>
          <td>${seg.label}</td>
          <td class="timecode">${formatTime(seg.start)} → ${formatTime(seg.end)}</td>
          <td>${seg.end - seg.start}초</td>
          <td>${seg.desc}</td>
        </tr>
      `).join('')

      // Play first segment
      if (player.src) {
        playSegment()
      }
    }

    function playSegment() {
      const clip = clips[currentClip]
      if (segmentIndex >= clip.segments.length) {
        player.pause()
        return
      }
      const seg = clip.segments[segmentIndex]
      player.currentTime = seg.start
      player.play()
    }

    player.addEventListener('timeupdate', () => {
      const clip = clips[currentClip]
      if (!clip) return

      const seg = clip.segments[segmentIndex]
      if (seg && player.currentTime >= seg.end) {
        segmentStartTime += (seg.end - seg.start)
        segmentIndex++
        if (segmentIndex < clip.segments.length) {
          playSegment()
        } else {
          player.pause()
        }
      }

      // Update captions
      const elapsed = segmentStartTime + (player.currentTime - (seg ? seg.start : 0))
      const caption = clip.captions.find(c => elapsed >= c.t && elapsed < c.end)
      if (caption) {
        captionEl.textContent = caption.text
        captionEl.style.display = ''
      } else {
        captionEl.textContent = ''
      }
    })

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60)
      const s = Math.floor(seconds % 60)
      return `${m}:${String(s).padStart(2, '0')}`
    }

    // Init first clip
    playClip(0)
  </script>
</body>
